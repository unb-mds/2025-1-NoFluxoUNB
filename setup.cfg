[flake8]
# Alinhado ao Black: o Black formata em 88 colunas e quebra de forma
# incompatível com E203/W503, então estes são ignorados por recomendação
# oficial do próprio Black.
# O Black é a autoridade sobre largura de linha; o flake8 ignora E501 para
# não conflitar com strings/comentários que o Black não quebra.
# E402 é tolerado porque vários scripts/testes ajustam sys.path antes dos
# imports. W293/E266/E741/F824 são ruído estilístico pré-existente.
max-line-length = 88
extend-ignore = E203, W503, E501, E402, W293, E266, E741, F824
exclude =
    .git,
    __pycache__,
    node_modules,
    build,
    dist,
    .venv,
    venv,
    no_fluxo_frontend/ios,
    no_fluxo_frontend/android
