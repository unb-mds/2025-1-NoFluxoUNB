name: CI

# Pipeline único de Integração Contínua do NoFluxoUNB.
# Cada job mapeia para um nível da pirâmide de testes da disciplina FGA0314.
# Documentação: docs/testes/pipeline-ci.md

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  # Análise estática Python (não é teste funcional: formatação + lint)
  qualidade-python:
    name: Qualidade Python (Black + Flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Versões fixadas para garantir resultado determinístico entre máquinas.
      - run: pip install black==25.11.0 flake8==7.3.0
      - name: Black (verificação de formatação)
        run: black --check .
      - name: Flake8 (lint)
        run: flake8 .

  # Testes de unidade/integração do backend de dados Python (Pytest)
  testes-python:
    name: Testes Python (Pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependências de sistema (OCR/PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por poppler-utils
      - name: Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r tests-python/requirements.txt
          pip install pytest pytest-cov pytest-mock
      - name: Pytest
        working-directory: tests-python
        run: python -m pytest

  # Testes de unidade do backend TypeScript (Jest)
  testes-backend:
    name: Testes Backend TS (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: no_fluxo_backend/package-lock.json
      - name: Instalar dependências
        working-directory: no_fluxo_backend
        run: npm ci
      - name: Jest
        working-directory: no_fluxo_backend
        run: npm test

  # Testes de unidade do frontend Svelte (Vitest)
  testes-frontend:
    name: Testes Frontend Svelte (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: no_fluxo_frontend_svelte/package-lock.json
      - name: Instalar dependências
        working-directory: no_fluxo_frontend_svelte
        run: npm ci
      # Sem arquivos de teste ainda (ver Fase 3 do plano); --passWithNoTests
      # mantém o job verde e pronto para receber a suíte de componentes.
      - name: Vitest
        working-directory: no_fluxo_frontend_svelte
        run: npx vitest run --passWithNoTests
