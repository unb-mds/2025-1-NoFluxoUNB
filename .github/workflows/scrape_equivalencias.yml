name: Scrape Equivalencias

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Scrape Ementa"]
    types: [completed]

jobs:
  jobEquivalencias:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Upgrade pip and install Cython
        run: |
          python -m pip install --upgrade pip
          pip install wheel Cython

      - name: Install dependencies
        run: |
          pip install --no-build-isolation -r DBA/scraping/requirements.txt

      - name: Create log directory
        run: mkdir -p DBA/logs

      - name: 1. Scrape Equivalencias
        working-directory: DBA/scraping
        run: |
          set -o pipefail
          python -u scraping_equivalencias.py 2>&1 | tee ../logs/scraping_equivalencias.log

      - name: 2. Insert Pre-requisitos/Equivalencias (Supabase)
        working-directory: DBA/database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          python -u 02_insert_pre_requisitos_equivalencias.py 2>&1 | tee ../logs/02_insert_pre_requisitos_equivalencias.log

      - name: Commit dados coletados
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "[CI] Atualiza dados de equivalencias/materias"
          file_pattern: "DBA/dados/materias/**/*.json"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-scrape-equivalencias
          path: DBA/logs/*.log
          if-no-files-found: warn
