name: Run web scraper

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Modo de execucao"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - dba_only
  schedule:
    - cron: '0 0 1 * *'  # Executa no dia 1 de cada mês (00:00 UTC)

jobs:
  jobScraping:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Upgrade pip and install Cython
        run: |
          python -m pip install --upgrade pip
          pip install Cython

      - name: Install dependencies
        run: |
          pip install wheel
          pip install --no-build-isolation -r DBA/scraping/requirements.txt

      - name: Create scraping log directory
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'dba_only' }}
        run: mkdir -p DBA/logs

      - name: Execute scraping_ementa.py
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'dba_only' }}
        working-directory: DBA/scraping
        run: |
          set -o pipefail
          python -u scraping_ementa.py 2>&1 | tee ../logs/scraping_ementa.log

      - name: Execute scraping_equivalencias.py
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'dba_only' }}
        working-directory: DBA/scraping
        run: |
          set -o pipefail
          python -u scraping_equivalencias.py 2>&1 | tee ../logs/scraping_equivalencias.log

      - name: Execute scraping_turmas.py
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'dba_only' }}
        working-directory: DBA/scraping
        run: |
          set -o pipefail
          python -u scraping_turmas.py 2>&1 | tee ../logs/scraping_turmas.log

      - name: Skip scraping in dba_only mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode == 'dba_only' }}
        run: echo "Modo dba_only selecionado: scraping foi pulado."

      - name: Upload scraping data
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'dba_only' }}
        uses: actions/upload-artifact@v4
        with:
          name: scraping-dados
          path: DBA/dados
          if-no-files-found: error

      - name: Upload scraping logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraping-logs
          path: DBA/logs/*.log
          if-no-files-found: warn

  jobDBA:
    needs: jobScraping  # <-- Garante que o banco de dados só roda depois do scraping
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Upgrade pip and install Cython
        run: |
          python -m pip install --upgrade pip
          pip install Cython

      - name: Install dependencies
        run: |
          pip install wheel
          pip install --no-build-isolation -r DBA/scraping/requirements.txt

      - name: Download scraping data
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_mode != 'dba_only' }}
        uses: actions/download-artifact@v4
        with:
          name: scraping-dados
          path: DBA/dados

      - name: Validate local data for dba_only mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode == 'dba_only' }}
        shell: bash
        run: |
          test -d DBA/dados/estruturas-curriculares
          test -f DBA/dados/cursos-de-graduacao.json
          qtd=$(ls DBA/dados/estruturas-curriculares/*.json 2>/dev/null | wc -l)
          echo "Arquivos de estrutura encontrados: ${qtd}"
          test "${qtd}" -gt 0

      - name: Create DBA log directory
        run: mkdir -p DBA/logs

      - name: Execute 01_insert_cursos_matrizes_materias.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          python -u DBA/database/01_insert_cursos_matrizes_materias.py 2>&1 | tee DBA/logs/01_insert_cursos_matrizes_materias.log

      - name: Execute 02_insert_pre_requisitos_equivalencias.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          python -u DBA/database/02_insert_pre_requisitos_equivalencias.py 2>&1 | tee DBA/logs/02_insert_pre_requisitos_equivalencias.log

      - name: Execute 03_insert_turmas.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -o pipefail
          python -u DBA/database/03_insert_turmas.py 2>&1 | tee DBA/logs/03_insert_turmas.log
          
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "[CI] Relatórios encontrados e baixados com sucesso!"
          file_pattern: "DBA/dados/**/*.json"

      - name: Upload DBA logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dba-logs
          path: DBA/logs/*.log
          if-no-files-found: warn
