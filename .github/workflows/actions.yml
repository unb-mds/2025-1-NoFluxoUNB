name: Run web scraper

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Executa às 00:00 do dia 1 de cada mês 

jobs:
  jobScraping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Upgrade pip and install Cython
        run: |
          python -m pip install --upgrade pip
          pip install Cython

      - name: Install dependencies
        run: |
          pip install wheel
          pip install --no-build-isolation -r DBA/scraping/requirements.txt

      - name: Bootstrap cursos base file
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request
          import socket
          from pathlib import Path

          urls = [
              "https://dados.unb.br/dataset/cbae3cab-650f-487e-b936-0a5576ff757b/resource/"
              "673b46a0-05f9-4686-9b0c-578c16bc85e0/download/cursos-de-graduacao-08-2024.json",
              "http://dados.unb.br/dataset/cbae3cab-650f-487e-b936-0a5576ff757b/resource/"
              "673b46a0-05f9-4686-9b0c-578c16bc85e0/download/cursos-de-graduacao-08-2024.json",
          ]
          output = Path("DBA/dados/cursos-de-graduacao.json")
          output.parent.mkdir(parents=True, exist_ok=True)

          headers = {"User-Agent": "Mozilla/5.0 (CI bootstrap NoFluxo)"}
          payload = None
          last_error = None

          for url in urls:
              for attempt in range(1, 6):
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req, timeout=180) as response:
                          payload = json.loads(response.read().decode("utf-8"))
                      print(f"Download concluido: {url} (tentativa {attempt})")
                      break
                  except (urllib.error.URLError, socket.timeout, TimeoutError, ValueError) as exc:
                      last_error = exc
                      wait_s = min(30, attempt * 5)
                      print(
                          f"Falha ao baixar de {url} (tentativa {attempt}/5): {exc}. "
                          f"Aguardando {wait_s}s..."
                      )
                      time.sleep(wait_s)
              if payload is not None:
                  break

          if payload is None:
              raise RuntimeError(
                  f"Nao foi possivel baixar cursos-de-graduacao.json apos retries. "
                  f"Ultimo erro: {last_error}"
              )

          output.write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"Arquivo base gerado em: {output}")
          PY

      - name: Execute Script Scraping
        working-directory: DBA/scraping
        run: |
          python scraping_cursos.py
          python scraping_ementa.py
          python scraping_equivalencias.py
          python scraping_turmas.py

      - name: Upload scraping data
        uses: actions/upload-artifact@v4
        with:
          name: scraping-dados
          path: DBA/dados
          if-no-files-found: error

  jobDBA:
    needs: jobScraping  # <-- Garante que o banco de dados só roda depois do scraping
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Upgrade pip and install Cython
        run: |
          python -m pip install --upgrade pip
          pip install Cython

      - name: Install dependencies
        run: |
          pip install wheel
          pip install --no-build-isolation -r DBA/scraping/requirements.txt

      - name: Download scraping data
        uses: actions/download-artifact@v4
        with:
          name: scraping-dados
          path: DBA/dados

      - name: Execute Script DBA
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python DBA/database/01_insert_cursos_matrizes_materias.py
          python DBA/database/02_insert_pre_requisitos_equivalencias.py
          python DBA/database/03_insert_turmas.py
          
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "[CI] Relatórios encontrados e baixados com sucesso!"
          file_pattern: "DBA/dados/**/*.json"
