name: Run web scraper

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Executa às 00:00 do dia 1 de cada mês 

jobs:
     build:
        runs-on: ubuntu-latest
        steps:

          - name: Checkout Repository
            uses: actions/checkout@v3
          
          - name: Setup Python
            uses: actions/setup-python@v4
            with:
              python-version: '3.9'

          - name: Upgrade pip and install Cython
            run: |
              python -m pip install --upgrade pip
              pip install Cython

          - name: Install dependencies
            run: |
              pip install wheel
              pip install --no-build-isolation -r DBA/scraping/requirements.txt

          - name: Execute Script Scraping
            run:
              python DBA/scraping/scraping_equivalencias.py
              python DBA/scraping/scraping_turmas.py
              python DBA/scraping/scraping_ementa.py

          - name: Execute Script DBA
            env:
              SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
              SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
              SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            run: 
              python DBA/database/01_insert_cursos_matrizes_materias.py
              python DBA/database/02_insert_pre_requisitos_equivalencias.py
              python DBA/database/03_insert_turmas.py
              
          - name: Commit Changes
            uses: stefanzweifel/git-auto-commit-action@v4
            with:
              commit_message: "[CI] Relatórios encontrados e baixados com sucesso!"
              file_pattern: "DBA/database/estruturas-curriculares/*.json"
